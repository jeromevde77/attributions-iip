name: Build & Push Demo images

on:
  push:
    branches: [demo]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  build-demo:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VERSION
        id: version
        run: echo "ver=$(cat VERSION 2>/dev/null || echo 'demo')" >> $GITHUB_OUTPUT

      - name: Build & push backend demo
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/attributions-backend:demo

      - name: Build & push frontend demo
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_DEMO_MODE=true
            VITE_BUILD_VERSION=${{ steps.version.outputs.ver }}-demo
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/attributions-frontend:demo
